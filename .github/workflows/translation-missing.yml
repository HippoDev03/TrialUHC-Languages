name: Translation Missing Check

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: translation-missing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Generate missing translation reports
        run: ruby scripts/check-missing-translations.rb

      - name: Add summary to workflow run
        if: always()
        run: |
          if [ -f missing/SUMMARY.md ]; then
            cat missing/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on pull request
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'missing/SUMMARY.md';
            const marker = '<!-- trialuhc-translation-missing-report -->';
            const summary = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8').trim()
              : '# Missing Translation Report\n\nNo summary file was generated.';
            const body = `${marker}\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload missing translation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: missing-translation-reports
          path: missing/
          if-no-files-found: error
