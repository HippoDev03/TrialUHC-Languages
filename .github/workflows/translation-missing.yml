name: Translation Missing Check

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: translation-missing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Generate missing translation reports
        run: ruby scripts/check-missing-translations.rb

      - name: Add summary to workflow run
        if: always()
        run: |
          if [ -f missing/SUMMARY.md ]; then
            cat missing/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload missing translation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: missing-translation-reports
          path: missing/
          if-no-files-found: error
