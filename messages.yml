# Shared errors
errors:
  no-permission: "<prefix><red>You do not have permission to do that.</red>"
  players-only: "<prefix><red>Only players can use this command.</red>"
  already-running: "<prefix><red>A match is already running.</red>"
  not-running: "<prefix><red>No active match to stop.</red>"
  world-missing: "<prefix><red>Configured game world <world> is not loaded.</red>"
  world-not-loaded: "<prefix><red>World <world> is not currently loaded.</red>"
  invalid-world-name: "<prefix><red>World names may only use letters, numbers, underscores, and dashes.</red>"
  invalid-border-size: "<prefix><red>Border size must be a positive number.</red>"
  invalid-border-center: "<prefix><red>Border center must be valid X and Z numbers.</red>"
  invalid-duration: "<prefix><red>Duration must be a positive whole number of seconds.</red>"
  no-grace-period: "<prefix><red>There is no active grace period to skip.</red>"
  no-elimination-targets: "<prefix><red>No active match players matched that target.</red>"
  command-disabled: "<prefix><red>Default server commands are disabled for players.</red>"
  chunky-unavailable: "<prefix><red>Chunky is not installed or disabled. Install the Chunky plugin to use world preloading.</red>"
  chunky-disabled: "<prefix><red>Chunky integration is disabled in config.</red>"
  chunky-no-active-task: "<prefix><red>No Chunky preload is currently being tracked.</red>"
  world-create-failed: "<prefix><red>Failed to create world <world>.</red>"
  world-not-overworld: "<prefix><red>World <world> is not a normal overworld.</red>"
  world-protected: "<prefix><red>World <world> is protected and cannot be deleted or regenerated.</red>"
  world-unload-failed: "<prefix><red>Failed to unload world <world>.</red>"
  world-delete-failed: "<prefix><red>Failed to delete world <world>.</red>"
  not-enough-players: "<prefix><red>Need <required> players to start. Currently online: <current>.</red>"
  player-not-found: "<prefix><red>Player <player> is not online.</red>"
  use-pm-command: "<prefix><#f4d35e>Use <white>/pm</white> for direct messages.</#f4d35e>"
  pm-self: "<prefix><red>You cannot message yourself.</red>"
  no-reply-target: "<prefix><red>You have nobody to reply to.</red>"
  report-self: "<prefix><red>You cannot report yourself.</red>"
